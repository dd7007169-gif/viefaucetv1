name: Jalankan Bot VieFaucet

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Bahan
        run: |
          pip install requests colorama

      - name: Mulai Nuyul
        run: python bot.py
